<!DOCTYPE html>
<html>
<body>
   
<h1>Loop</h1>

    <input placeholder="Table Off" id="table_off" />
    <input placeholder="No of Time" id="number_of_times" />
    <button id="table_button">Show Table</button>
    <div id="table"></div>

    <script>
        let tableOff = document.getElementById("table_off")
        let numberOfTimes = document.getElementById("number_of_times")
        let tableBtn = document.getElementById("table_button")
        let tableDiv = document.getElementById("table")
        let renderTable = () => {
            let tableOffValue = tableOff.value
            let numberOfTimesValue = numberOfTimes.value
            tableDiv.innerHTML = ""
            for (x = 1; x <= numberOfTimesValue; x++) {
                let para = "<p>" + tableOffValue + " x " + x + " = " + x * tableOffValue + "</p>"
                tableDiv.innerHTML += para
            }
        }
        tableBtn.addEventListener("click", renderTable)



</script>




</body>
</html>
